<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config.gs GUI Generator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <h1>Config.gs GUI Generator</h1>
    <p>Edit your Habit + Lockouts config with a normal UI, then export ready-to-paste <code>Config.gs</code>.</p>
  </header>

  <main>
    <section class="panel">
      <h2>Import Existing Config.gs</h2>
      <p>Paste your full <code>Config.gs</code> contents and click <strong>Parse</strong>, or click <strong>Start Fresh</strong>.</p>
      <textarea id="importText" rows="10" placeholder="Paste full Config.gs code here..."></textarea>
      <div class="row gap">
        <button id="parseBtn">Parse Config.gs</button>
        <button id="freshBtn" class="secondary">Start Fresh</button>
      </div>
      <p id="importStatus" class="status"></p>
    </section>

    <section class="panel">
      <div class="tabs" role="tablist" aria-label="Config Sections">
        <button class="tab active" data-tab="global" role="tab" aria-selected="true">Global</button>
        <button class="tab" data-tab="metrics" role="tab" aria-selected="false">Metrics</button>
        <button class="tab" data-tab="blocks" role="tab" aria-selected="false">Blocks</button>
      </div>

      <div id="tab-global" class="tab-panel active"></div>
      <div id="tab-metrics" class="tab-panel"></div>
      <div id="tab-blocks" class="tab-panel"></div>
    </section>

    <section class="panel">
      <h2>Export</h2>
      <div class="row gap">
        <button id="exportBtn">Generate Config.gs</button>
        <button id="copyBtn" class="secondary">Copy to Clipboard</button>
      </div>
      <textarea id="exportText" rows="14" placeholder="Generated Config.gs will appear here..."></textarea>
      <p id="exportStatus" class="status"></p>
    </section>
  </main>

  <template id="helpIconTemplate">
    <span class="help" tabindex="0" aria-label="Help">?</span>
  </template>

  <script src="./app.js"></script>
</body>
</html>
