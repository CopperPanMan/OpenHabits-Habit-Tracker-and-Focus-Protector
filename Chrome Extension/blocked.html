<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Blocked by Lockouts</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Website Blocked</h1>
      <p id="target"></p>
      <p id="message"></p>

      <div class="row">
        <button id="legitimateBtn" class="unlock-button">Legitimate Unlock (60s wait, +20m unlock)</button>
        <button id="illegalBtn" class="unlock-button">Illegal Unlock (30s wait, +10m unlock)</button>
      </div>

      <div id="status"></div>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
