<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lockouts Client Options</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Lockouts Client</h1>
      <p>Edit blocked websites and server integration settings.</p>

      <label for="blockedDomains">Blocked websites (comma or newline separated)</label>
      <textarea id="blockedDomains" rows="6"></textarea>

      <label for="lockoutsServerUrl">Lockouts server URL (optional)</label>
      <input id="lockoutsServerUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />

      <label for="lockoutsSecret">OpenHabits secret</label>
      <input id="lockoutsSecret" type="password" placeholder="your_random_secret_string" />

      <label for="startTimerMetricID">Start timer metric ID</label>
      <input id="startTimerMetricID" type="text" placeholder="start_timer" />

      <label for="stopTimerMetricID">Stop timer metric ID</label>
      <input id="stopTimerMetricID" type="text" placeholder="stop_timer" />


      <label for="illegalUnlockWaitSeconds">Illegal unlock wait (seconds)</label>
      <input id="illegalUnlockWaitSeconds" type="number" min="1" step="1" placeholder="30" />

      <label for="legitimateUnlockWaitSeconds">Legitimate unlock wait (seconds)</label>
      <input id="legitimateUnlockWaitSeconds" type="number" min="1" step="1" placeholder="60" />

      <label for="illegalUnlockMetricID">Illegal Unlock metric ID (optional)</label>
      <input id="illegalUnlockMetricID" type="text" placeholder="illegal_unlock_metric" />

      <label for="metricLogKey">Metric logging key</label>
      <input id="metricLogKey" type="text" placeholder="record_metric_iOS" />

      <label class="inline">
        <input id="screenTimeLoggingEnabled" type="checkbox" />
        Enable screentime logging
      </label>

      <label class="inline">
        <input id="notificationsEnabled" type="checkbox" />
        Enable notifications
      </label>

      <button id="saveButton">Save settings</button>
      <div id="status"></div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
